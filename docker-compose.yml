version: "3.8"

# SocialFlow - local development infrastructure
# Run:  docker compose up -d
# Stop: docker compose down
# Reset: docker compose down -v
#
# 生产对象存储使用腾讯云 COS（见 application.yml 的 socialflow.storage 配置）。
# 本地开发如需本地对象存储，可自行 pull minio 并配置 COS 兼容的 S3 endpoint。

services:
  mysql:
    image: mysql:8.0
    container_name: socialflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-***REDACTED-DB-PASSWORD***}
      MYSQL_DATABASE: socialflow
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
      - --lower_case_table_names=1
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      # schema + 种子数据由 Flyway 迁移脚本管理（socialflow-admin/.../db/migration/V*.sql）
      # 旧的 sql/init-data.sql 仅含早期模板（1001-1004）若需要可挂载
      - ./sql/init-data.sql:/docker-entrypoint-initdb.d/01-init-data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: socialflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-***REDACTED-DB-PASSWORD***}"]
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-***REDACTED-DB-PASSWORD***}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: socialflow-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-***REDACTED-DB-PASSWORD***}
      POSTGRES_DB: socialflow_vec
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgvector:/var/lib/postgresql/data
      - ./sql/pgvector-init.sql:/docker-entrypoint-initdb.d/pgvector-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

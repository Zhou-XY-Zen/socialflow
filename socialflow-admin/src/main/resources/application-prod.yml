spring:
  datasource:
    hikari:
      maximum-pool-size: 30

# 生产环境关闭 Knife4j，避免 API schema 公开暴露
knife4j:
  enable: false

# 生产环境收紧 Actuator 端点（仅暴露 health/info/prometheus 给监控）
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: WARN
    com.socialflow: INFO
  file:
    name: logs/socialflow.log

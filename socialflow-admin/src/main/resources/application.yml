# ============================================================
# application.yml —— 本地兜底配置
# ============================================================
# 生产环境配置已迁移到 Nacos 配置中心（Data ID: socialflow.yml）
# 本文件仅作为本地开发的兜底配置，Nacos 中的配置优先级更高。
# ============================================================

server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: socialflow
  # Nacos 配置中心（spring.config.import 方式，替代 bootstrap.yml）
  config:
    import:
      - optional:nacos:socialflow.yml?group=DEFAULT_GROUP
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USER:nacos}
        password: ${NACOS_PASS:nacos}
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/socialflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    # 黄山版 4.10：源码不放明文密码。
    # 本地：在 IDEA Run Configuration 的 Environment 设置 MYSQL_PASSWORD=...
    # 生产：服务器 /opt/socialflow/.env 文件提供（权限 600，redeploy.py 启动时 source）
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  # Flyway DB 迁移
  # baseline-on-migrate=true + baseline-version=2 表示：
  #   - 现有生产环境（已有 schema + seed 数据）会被标记为 V2 baseline，跳过 V1/V2 不重复执行
  #   - 新部署（空 DB）会正常执行 V1__init_schema + V2__seed_templates
  #   - 后续业务表结构变更从 V3 开始累加（Wave 4 的 KB FTS / 图像缓存 / 内容乐观锁等都将 V3+）
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2
    table: flyway_schema_history
    validate-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 604800
  is-concurrent: true
  is-share: false
  token-style: random-64
  is-log: false

knife4j:
  enable: true
  openapi:
    title: SocialFlow API
    version: 2.0.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.socialflow.web.controller

# SocialFlow 自定义配置（本地开发兜底值）
socialflow:
  storage:
    # 对象存储：使用腾讯云 COS
    type: cos
    cos-secret-id: ${COS_SECRET_ID:your-cos-secret-id}
    cos-secret-key: ${COS_SECRET_KEY:your-cos-secret-key}
    cos-region: ap-guangzhou
    cos-bucket: socialflow-1315728369
    public-url: https://socialflow-1315728369.cos.ap-guangzhou.myqcloud.com
  ai:
    default-provider: deepseek
    encryption-key: ***REDACTED-EXAMPLE-AES-KEY***
    system-api-key: ${AI_API_KEY:your-api-key}
    providers:
      deepseek:
        base-url: https://api.deepseek.com/v1
        default-model: deepseek-reasoner
        timeout: 300s
      qwen:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        default-model: qwen-plus
        timeout: 120s
      glm:
        base-url: https://open.bigmodel.cn/api/paas/v4/
        default-model: glm-4-flash
        timeout: 60s
      openai:
        base-url: https://api.openai.com/v1
        default-model: gpt-4o-mini
        timeout: 60s
      claude:
        base-url: https://api.anthropic.com/v1
        default-model: claude-sonnet-4-6
        timeout: 60s
    guardrails:
      enabled: true
      sensitive-word-dict-path: classpath:guardrails/sensitive-words.txt
      max-input-tokens: 2000
      llm-check-model: deepseek-chat
    quota:
      daily-tokens-per-user: 100000
      monthly-tokens-per-user: 2000000
      rate-limit-per-minute: 10
    agent:
      max-rounds: 3
      timeout-seconds: 120
  vector:
    type: pgvector
    host: ${PG_HOST:localhost}
    port: 5432
    database: socialflow_vec
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD}
    collection-prefix: sf_
  embedding:
    provider: api
    model: text-embedding-v3
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
    api-key: ${EMBEDDING_API_KEY:your-embedding-key}
    dimension: 1024
    batch-size: 20
  rag:
    chunk-size: 512
    chunk-overlap: 64
    top-k: 10
    rerank-top-k: 5
    enable-hyde: true
    enable-hybrid-search: true
    # Wave 4.1：Reranker 真实实现（DashScope gte-rerank）已就位，默认开启
    enable-rerank: true
    rerank-model: gte-rerank
    rerank-api-url: https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank
  image:
    dashscope-api-key: ${DASHSCOPE_API_KEY:your-dashscope-key}
    dashscope-base-url: https://dashscope.aliyuncs.com/api/v1
    model: wanx-v1
    image-count: 4
    image-size: 1024*1024
    poll-interval-ms: 3000
    max-poll-count: 40
  publish:
    wechat-mp:
      app-id: ${WECHAT_APPID:your-wechat-appid}
      app-secret: ${WECHAT_SECRET:your-wechat-secret}

logging:
  level:
    root: INFO
    com.socialflow: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ============================================================
# Resilience4j —— LLM/Image/HTTP 外部调用的重试 + 熔断配置
# ============================================================
# 设计原则：
#   - retry-exceptions：仅对临时性故障重试（IO / Timeout / AiCallException）
#   - ignore-exceptions：业务异常（护栏命中 / 配额超限 / 参数错误）不重试
#   - 熔断阈值放宽（50% / 10 个采样窗口），避免单次抖动触发
resilience4j:
  retry:
    instances:
      llm-deepseek: &llm-retry
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.socialflow.common.exception.AiCallException
        ignore-exceptions:
          - com.socialflow.common.exception.GuardrailException
          - com.socialflow.common.exception.QuotaExceededException
          - com.socialflow.common.exception.ParamException
      llm-qwen: *llm-retry
      llm-glm: *llm-retry
      llm-openai: *llm-retry
      llm-claude: *llm-retry
      wanx-image:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - java.lang.RuntimeException
      wechat-mp:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      weibo-open:
        max-attempts: 3
        wait-duration: 1s
        exponential-backoff-multiplier: 2
      embedding-api:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - com.socialflow.common.exception.AiCallException
      cos-upload:
        max-attempts: 3
        wait-duration: 1s
  circuitbreaker:
    instances:
      llm-deepseek: &llm-cb
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      llm-qwen: *llm-cb
      llm-glm: *llm-cb
      llm-openai: *llm-cb
      llm-claude: *llm-cb
      wanx-image: *llm-cb
  ratelimiter:
    instances:
      # AI 文本生成：每秒最多 10 次调用，等待 200ms（容忍突发，超出则抛 RequestNotPermitted）
      ai-generate:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 200ms
        register-health-indicator: false
      # AI 图像生成：成本更高，每秒最多 3 次
      ai-image:
        limit-for-period: 3
        limit-refresh-period: 1s
        timeout-duration: 500ms
        register-health-indicator: false

# ============================================================
# Spring Boot Actuator + Prometheus
# ============================================================
# /actuator/health        —— 健康检查（含自定义 HealthIndicator，Wave 2.4）
# /actuator/info          —— 应用元信息
# /actuator/prometheus    —— Prometheus 抓取格式指标
# /actuator/metrics       —— JSON 指标查询
# /actuator/circuitbreakers —— Resilience4j 熔断状态
# /actuator/retries       —— Resilience4j 重试统计
# /actuator/ratelimiters  —— Resilience4j 限流状态
# Prod 配置在 application-prod.yml 收紧（仅 health/info/prometheus）
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,retries,ratelimiters,caches,flyway
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: socialflow
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,300ms,500ms,1s,3s

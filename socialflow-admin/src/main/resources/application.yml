server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
  shutdown: graceful

spring:
  profiles:
    active: dev
  application:
    name: socialflow
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/socialflow?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${DB_PASSWORD:***REDACTED-DB-PASSWORD***}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SocialFlowHikariCP
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:***REDACTED-DB-PASSWORD***}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.socialflow.model.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Sa-Token
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 604800                 # 7 days
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: random-64
  is-log: false

# Knife4j / OpenAPI
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# ==================================================================
# SocialFlow application config
# ==================================================================
socialflow:
  storage:
    type: minio                    # minio | oss
    endpoint: http://${MINIO_HOST:localhost}:9000
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: socialflow
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000/socialflow}

  ai:
    default-provider: deepseek
    encryption-key: ${AI_ENCRYPTION_KEY:***REDACTED-EXAMPLE-AES-KEY***}
    system-api-key: ${DEEPSEEK_API_KEY:sk-843ebdbb30fa4c19b082a4533882455d}
    providers:
      glm:
        base-url: https://open.bigmodel.cn/api/paas/v4/
        default-model: glm-4-flash
        timeout: 60s
      deepseek:
        base-url: https://api.deepseek.com/v1
        default-model: deepseek-reasoner
        timeout: 300s
      qwen:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        default-model: qwen-plus
        timeout: 120s
      openai:
        base-url: https://api.openai.com/v1
        default-model: gpt-4o-mini
        timeout: 60s
      claude:
        base-url: https://api.anthropic.com/v1
        default-model: claude-sonnet-4-6
        timeout: 60s
    guardrails:
      enabled: true
      sensitive-word-dict-path: classpath:guardrails/sensitive-words.txt
      max-input-tokens: 2000
      llm-check-model: deepseek-chat
    quota:
      daily-tokens-per-user: 100000
      monthly-tokens-per-user: 2000000
      rate-limit-per-minute: 10
    agent:
      max-rounds: 3
      timeout-seconds: 120

  vector:
    type: pgvector                 # pgvector | milvus
    host: ${PG_HOST:localhost}
    port: ${PG_PORT:5432}
    database: socialflow_vec
    username: postgres
    password: ${PG_PASSWORD:***REDACTED-DB-PASSWORD***}
    collection-prefix: sf_
    milvus:
      host: localhost
      port: 19530

  embedding:
    provider: api
    model: text-embedding-v3
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/embeddings
    api-key: ${EMBEDDING_API_KEY:sk-4668245a1acf47edbfb5597db19f71fc}
    dimension: 1024
    batch-size: 20

  rag:
    chunk-size: 512
    chunk-overlap: 64
    top-k: 10
    rerank-top-k: 5
    enable-hyde: true
    enable-hybrid-search: true
    enable-rerank: false
    rerank-model: bge-reranker-v2-m3

  # AI 文生图配置（DashScope 通义万相 wanx 模型）
  image:
    dashscope-api-key: ${DASHSCOPE_API_KEY:sk-4668245a1acf47edbfb5597db19f71fc}
    dashscope-base-url: https://dashscope.aliyuncs.com/api/v1
    model: wanx-v1
    image-count: 4
    image-size: 1024*1024
    poll-interval-ms: 3000
    max-poll-count: 40

  publish:
    wechat-mp:
      app-id: ${WECHAT_MP_APPID:wxb872119b3c3745d6}
      app-secret: ${WECHAT_MP_SECRET:df859078b8b79f069757598cb98613fb}

logging:
  level:
    root: INFO
    com.socialflow: DEBUG
    org.springframework.web: INFO
    dev.langchain4j: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
